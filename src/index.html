<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>NoUploadVideo — Client-Side Video Converter</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Convert videos between MP4, AVI, MKV, MOV and extract MP3. 100% private, browser-based processing with FFmpeg WebAssembly.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    (function () {
      var stored = localStorage.getItem('nouploadvideo-theme');
      var isDark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
